version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: gzdoc-postgres-prod
    environment:
      POSTGRES_DB: gzdoc_prod
      POSTGRES_USER: gzdoc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # 从环境变量读取
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - /data/gzdoc/postgres:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - gzdoc-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gzdoc"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: gzdoc-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - /data/gzdoc/redis:/data
    networks:
      - gzdoc-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: gzdoc-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /data/gzdoc/minio:/data
    networks:
      - gzdoc-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gzdoc-zookeeper-prod
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - /data/gzdoc/zookeeper:/var/lib/zookeeper
    networks:
      - gzdoc-network
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gzdoc-kafka-prod
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://36.141.21.176:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - /data/gzdoc/kafka:/var/lib/kafka/data
    networks:
      - gzdoc-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Weaviate 向量数据库
  weaviate:
    image: semitechnologies/weaviate:1.24.0
    container_name: gzdoc-weaviate-prod
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY}
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - /data/gzdoc/weaviate:/var/lib/weaviate
    networks:
      - gzdoc-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  # ElasticSearch 全文搜索
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: gzdoc-elasticsearch-prod
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - /data/gzdoc/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - gzdoc-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTIC_PASSWORD} -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Nginx (反向代理)
  nginx:
    image: nginx:alpine
    container_name: gzdoc-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/gzdoc/nginx/logs:/var/log/nginx
      - /data/gzdoc/ssl:/etc/nginx/ssl:ro
    networks:
      - gzdoc-network
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  gzdoc-network:
    driver: bridge
