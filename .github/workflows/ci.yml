name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test Backend
      run: |
        cd backend
        mvn clean test

    - name: Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/target/site/jacoco/jacoco.xml
        flags: backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint
      run: |
        cd frontend
        npm run lint

    - name: Type Check
      run: |
        cd frontend
        npm run type-check

    - name: Test
      run: |
        cd frontend
        npm test -- --coverage

    - name: Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./frontend/coverage/lcov.info
        flags: frontend

  ai-service-test:
    name: AI Service Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: ai-service/requirements.txt

    - name: Install Dependencies
      run: |
        cd ai-service
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Lint with ruff
      run: |
        cd ai-service
        pip install ruff
        ruff check .

    - name: Type Check with mypy
      run: |
        cd ai-service
        pip install mypy
        mypy app --ignore-missing-imports

    - name: Test
      run: |
        cd ai-service
        pytest --cov=app --cov-report=xml

    - name: Upload Coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./ai-service/coverage.xml
        flags: ai-service

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Image
      run: |
        cd backend
        docker build -t gzdoc-backend:test .

    - name: Build Frontend Image
      run: |
        cd frontend
        docker build -t gzdoc-frontend:test .

    - name: Build AI Service Image
      run: |
        cd ai-service
        docker build -t gzdoc-ai-service:test .
